# 프로덕션(Lightsail/EC2)용 — Caddy가 80/443 받고 자동 TLS 후 앱으로 프록시
services:
  erp:
    build: .
    env_file: .env
    environment:
      DB_PATH: /data/enchante_erp.db
    volumes:
      - erp-data:/data
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN을 .env에 설정하세요}
    restart: unless-stopped
    depends_on:
      - erp

volumes:
  erp-data:
  caddy-data:
  caddy-config:
